<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        h1 {
            color: #38bdf8;
            margin-top: 0;
        }

        p {
            color: #cbd5e1;
        }

        button {
            margin-top: 1rem;
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #38bdf8;
            color: #0f172a;
            transition: 0.2s;
        }

        button:hover {
            background: #7dd3fc;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 GitHub Pages Works!</h1>
    <p>If you're seeing this page, your GitHub Pages site is live.</p>

    <button onclick="changeMessage()">Click Me</button>

    <p id="message"></p>
</div>

<script>
function changeMessage() {
    document.getElementById("message").textContent =
        "JavaScript is working too! 🚀";
}
</script>

</body>
</html>
